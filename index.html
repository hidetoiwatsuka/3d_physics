<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>物理法則の3Dスケールマップ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #07070f;
  color: #eee;
  font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
#header {
  padding: 10px 20px;
  text-align: center;
  background: rgba(255,255,255,0.03);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  flex-shrink: 0;
}
#header h1 { font-size: 1.15em; font-weight: 800; letter-spacing: 0.04em; }
#header p  { font-size: 0.72em; color: #777; margin-top: 2px; }
#main { display: flex; flex: 1; min-height: 0; }
#canvas-wrap { flex: 1; position: relative; cursor: grab; }
#canvas-wrap:active { cursor: grabbing; }
canvas { display: block; width: 100%; height: 100%; }

/* Axis labels overlay */
#labels { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
.lbl {
  position: absolute;
  font-size: 0.62em;
  white-space: nowrap;
  transform: translate(-50%,-50%);
  text-shadow: 0 0 6px #07070f, 0 0 10px #07070f;
}
.lbl-axis-name {
  font-weight: 800;
  font-size: 0.72em;
}

/* Sidebar */
#sidebar {
  width: 230px;
  background: rgba(255,255,255,0.025);
  border-left: 1px solid rgba(255,255,255,0.07);
  overflow-y: auto;
  padding: 14px;
  flex-shrink: 0;
}
.sb-title {
  font-size: 0.68em;
  color: #666;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 8px;
  margin-top: 16px;
}
.sb-title:first-child { margin-top: 0; }

/* Velocity filter */
.vbtn {
  display: block;
  width: 100%;
  margin-bottom: 4px;
  padding: 7px 10px;
  font-size: 0.72em;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  color: #aaa;
  cursor: pointer;
  border-radius: 5px;
  text-align: left;
  transition: background 0.15s;
}
.vbtn:hover { background: rgba(255,255,255,0.1); }
.vbtn.on { border-color: rgba(255,100,200,0.5); background: rgba(255,100,200,0.1); color: #ffaaee; }

/* Legend */
.leg-item {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 6px;
  font-size: 0.7em;
  color: #bbb;
}
.leg-dot { width:14px; height:14px; border-radius:3px; flex-shrink:0; border:1px solid rgba(255,255,255,0.12); }

/* Tooltip */
#tip {
  position: fixed;
  display: none;
  background: rgba(8,8,20,0.97);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 9px;
  padding: 11px 15px;
  max-width: 230px;
  pointer-events: none;
  z-index: 200;
}
#tip .t-regime { font-weight: 800; font-size: 0.92em; margin-bottom: 5px; }
#tip .t-axes { font-size: 0.68em; color: #666; margin-bottom: 6px; }
#tip .t-ex { font-size: 0.78em; color: #bbb; }
#tip .t-law { font-size: 0.7em; color: #666; font-style:italic; margin-top:4px; }

/* Hint */
#hint {
  position: absolute;
  bottom: 10px; left: 50%;
  transform: translateX(-50%);
  font-size: 0.65em;
  color: rgba(255,255,255,0.25);
  pointer-events: none;
  white-space: nowrap;
}
</style>
</head>
<body>

<div id="header">
  <h1>物理法則の3Dスケールマップ</h1>
  <p>X軸：時間スケール　Y軸：サイズスケール　Z軸：速度スケール (v/c)　｜　ドラッグで回転・スクロールでズーム</p>
</div>

<div id="main">
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div id="labels"></div>
    <div id="hint">ドラッグ：回転　　スクロール：ズーム　　ホバー：詳細</div>
  </div>

  <div id="sidebar">
    <div class="sb-title">速度レイヤー (Z軸)</div>
    <button class="vbtn on" data-v="all">全レイヤー表示</button>
    <button class="vbtn" data-v="0">V0 ｜ v ≪ c　非相対論的</button>
    <button class="vbtn" data-v="1">V1 ｜ v ~ 0.01c　弱相対論的</button>
    <button class="vbtn" data-v="2">V2 ｜ v ~ 0.1c　SR が効く</button>
    <button class="vbtn" data-v="3">V3 ｜ v ~ 0.5c　強相対論的</button>
    <button class="vbtn" data-v="4">V4 ｜ v → c　超相対論的</button>
    <div class="sb-title">凡例</div>
    <div id="legend"></div>
  </div>
</div>

<div id="tip">
  <div class="t-regime" id="tt-r"></div>
  <div class="t-axes" id="tt-a"></div>
  <div class="t-ex"   id="tt-e"></div>
  <div class="t-law"  id="tt-l"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── AXIS LABELS ────────────────────────────────────────────
const T_LABELS = ['10⁻²³s (核力)','10⁻¹⁵s (fs)','10⁻⁹s (ns)','10⁻³s (ms)','1s','10⁷s (年)','10¹³s (百万年)','10¹⁷s (宇宙年齢)'];
const S_LABELS = ['10⁻¹⁵m 原子核','10⁻¹⁰m 原子','10⁻⁶m 細胞','1m 人間','10⁷m 地球','10¹²m 太陽系','10²¹m 銀河','10²⁶m 宇宙'];
const V_LABELS = ['v≪c','0.01c','0.1c','0.5c','v→c'];

// ── REGIMES ────────────────────────────────────────────────
const R = {
  bb:      { n:'ビッグバン・量子重力',              c:0x9900ff },
  par:     { n:'素粒子・核物理 (QCD)',               c:0xff2200 },
  rpar:    { n:'相対論的核物理',                    c:0xff5500 },
  qgp:     { n:'クォーク・グルーオンプラズマ',      c:0xff0077 },
  qm:      { n:'量子力学',                          c:0xff9933 },
  rqm:     { n:'相対論的量子力学 (Dirac)',          c:0xff6622 },
  qcl:     { n:'量子→古典の境界',                  c:0xcccc00 },
  cl:      { n:'古典力学・熱力学',                  c:0x00ccdd },
  sr:      { n:'特殊相対性理論',                    c:0xff44cc },
  bio:     { n:'生物学・複雑系',                    c:0x00cc44 },
  geo:     { n:'地質学・プレートテクトニクス',      c:0x00aa88 },
  ast:     { n:'天体力学・重力',                    c:0x4488ff },
  rast:    { n:'相対論的天体物理',                  c:0x6644ff },
  agn:     { n:'相対論的ジェット・GRB',             c:0xdd00ff },

  spc:     { n:'未検証の物理理論',                  c:0xff88ff },
};

// ── CELL DATA ──────────────────────────────────────────────
// Format: [t, s, v, regime, example, law]
const CELLDATA = [
  // ─── V=0 非相対論的 ───
  // Nucleus s=0
  [0,0,0,'par','クォーク閉じ込め・核力','強い相互作用 (QCD)'],
  [1,0,0,'par','核融合・核分裂','核力 + 弱い力'],
  [2,0,0,'par','放射性崩壊 (β崩壊・γ線)','弱い相互作用'],
  [3,0,0,'qm','長寿命放射性同位体','量子トンネル効果'],
  [4,0,0,'qm','放射線・PET・医療応用','核物理'],
  [5,0,0,'qm','炭素14・ウラン鉛法','確率的崩壊'],
  [7,0,0,'spc','陽子崩壊（GUTの予測）','大統一理論（未検証）'],
  // Atom s=1
  [1,1,0,'qm','電子遷移・化学結合の形成破壊','量子電磁力学 (QED)'],
  [2,1,0,'qm','化学反応・蛍光・レーザー','シュレーディンガー方程式'],
  [3,1,0,'qm','NMR・量子コンピュータ','量子力学'],
  [4,1,0,'qcl','熱・圧力・拡散','ボルツマン統計'],
  [5,1,0,'qcl','鉱物の結晶化・同位体分留','熱力学 + 拡散'],
  // Cell s=2
  [1,2,0,'qm','光合成の量子コヒーレンス','量子トンネル効果'],
  [2,2,0,'qm','タンパク質の折り畳み','量子化学'],
  [3,2,0,'bio','酵素反応・ATP合成','統計力学・化学動力学'],
  [4,2,0,'bio','細胞分裂・神経伝達','生化学 + 流体力学'],
  [5,2,0,'bio','個体群動態・共進化','複雑系・統計'],
  [6,2,0,'bio','カンブリア爆発・大量絶滅','進化論・遺伝学'],
  // Human s=3
  [2,3,0,'qcl','神経信号・デコヒーレンス','量子デコヒーレンス理論'],
  [3,3,0,'cl','衝突・爆発・反射','ニュートン力学'],
  [4,3,0,'cl','日常の物体運動','ニュートン力学・熱力学'],
  [5,3,0,'cl','都市・技術・文化の変遷','社会動態・複雑系'],
  [6,3,0,'bio','種の分岐・文明の誕生','自然選択・遺伝学'],
  // Earth s=4
  [3,4,0,'cl','地震波・爆発の伝播','弾性力学・流体力学'],
  [4,4,0,'cl','台風・海流・津波','ナビエ–ストークス方程式'],
  [5,4,0,'geo','氷河期・海面変動','複雑系・熱力学'],
  [6,4,0,'geo','大陸移動・山の形成','粘性流体力学（超長期）'],
  [7,4,0,'geo','大気・海洋・生命の共進化','多スケール複合系'],
  // Solar s=5
  [4,5,0,'ast','惑星位置の刻々の変化','ニュートン重力'],
  [5,5,0,'ast','惑星公転・潮汐・彗星','ケプラーの法則'],
  [6,5,0,'ast','核融合・赤色巨星化','核物理 + 重力'],
  [7,5,0,'cos','白色矮星・ブラックホール形成','一般相対性理論'],
  // Galaxy s=6
  [5,6,0,'ast','恒星の公転軌道','ニュートン重力'],
  [6,6,0,'ast','渦巻き腕・恒星生成','重力 + 暗黒物質'],
  [7,6,0,'cos','銀河の合体・消滅','一般相対性理論'],
  // Universe s=7
  [0,7,0,'bb','素粒子スープ・相転移','量子重力・大統一理論'],
  [5,7,0,'cos','銀河の後退・赤方偏移','ハッブルの法則'],
  [6,7,0,'cos','フィラメント・ボイド形成','一般相対性理論'],
  [7,7,0,'cos','ダークエネルギー加速膨張','一般相対性理論'],

  // ─── V=1 弱相対論的 v~0.01c ───
  [0,0,1,'par','核力の弱相対論的補正','QCD + 微弱SR効果'],
  [1,0,1,'par','低エネルギー加速器（SR補正）','核物理 + 弱いSR'],
  [1,1,1,'qm','重元素の電子（SR補正始まり）','量子力学 + 弱いSR'],
  [2,1,1,'qm','化学反応（重元素の補正）','量子化学 + 弱いSR'],
  [4,5,1,'ast','太陽風粒子 (v ~ 0.01c)','電磁気学 + 弱いSR'],
  [4,3,1,'cl','地球から見た高速電子機器','古典力学 + 微弱SR'],
  [0,7,1,'bb','ビッグバン（GUT相転移後）','大統一理論'],
  [5,7,1,'cos','宇宙膨張（放射優勢期後）','ハッブルの法則'],
  [6,6,1,'ast','銀河内ガス・弱相対論的プラズマ','磁気流体力学'],
  [6,5,1,'ast','恒星進化・弱相対論的プラズマ','核物理 + MHD'],

  // ─── V=2 相対論的 v~0.1c ───
  [0,0,2,'rpar','相対論的核反応（加速器）','QCD + 特殊相対性理論'],
  [1,0,2,'rpar','シンクロトロン放射源での核物理','核物理 + SR'],
  [1,1,2,'rqm','ディラック方程式が必要な領域','相対論的量子力学'],
  [2,1,2,'rqm','金が黄色・水銀が液体な理由','Dirac方程式 + 化学'],
  [3,1,2,'rqm','重イオン内殻電子の相対論効果','QED補正'],
  [3,3,2,'sr','特殊相対性理論（時間遅れ顕著）','ローレンツ変換'],
  [4,3,2,'sr','宇宙船・粒子検出器での時間遅れ','ローレンツ変換'],
  [5,3,2,'sr','双子のパラドックスが実感できる旅','ローレンツ変換'],
  [5,5,2,'rast','相対論的恒星風・高エネルギー電子','相対論的流体力学'],
  [6,5,2,'rast','相対論的ジェット（発生源近傍）','SR + 磁気流体力学'],
  [6,6,2,'agn','AGN相対論的ジェット（初期段階）','相対論的MHD'],
  [4,7,2,'cos','初期宇宙（放射優勢期）','宇宙論 + SR'],

  // ─── V=3 強相対論的 v~0.5c ───
  [0,0,3,'qgp','クォーク・グルーオンプラズマ（RHIC）','相対論的QCD'],
  [1,0,3,'rpar','高エネルギー宇宙線衝突','QCD + SR（強）'],
  [0,1,3,'rqm','極端な相対論的量子プラズマ','Dirac + QED'],
  [1,1,3,'rqm','高エネルギーレプトン散乱','相対論的QED'],
  [3,3,3,'sr','双子のパラドックスが劇的になる','ローレンツ変換（強）'],
  [4,3,3,'sr','宇宙旅行者の時間が半分以下になる','相対論的時間遅れ'],
  [5,5,3,'rast','中性子星からの相対論的噴出','GR + SR'],
  [6,5,3,'rast','コンパクト天体ジェット（相対論的）','相対論的MHD'],
  [6,6,3,'agn','強力なAGNジェット・クェーサー','相対論的磁気流体力学'],
  [0,7,3,'bb','ビッグバン（クォーク時代）','相対論的統計力学'],
  [5,7,3,'cos','初期宇宙・バリオン生成','宇宙論 + SR + CP対称性の破れ'],

  // ─── V=4 超相対論的 v→c ───
  [0,0,4,'qgp','LHC重イオン衝突 / 初期宇宙の物質状態','相対論的QCD（超高温）'],
  [1,0,4,'rpar','超高エネルギー宇宙線（一次）','QCD + 極端なSR'],
  [0,1,4,'rqm','超高エネルギープラズマ中の電子','QED（極端な領域）'],
  [1,1,4,'rqm','電子-陽電子対生成','QED + 対生成消滅'],
  [5,5,4,'agn','ガンマ線バースト (GRB) 噴出物','相対論的衝撃波（Γ>>1）'],
  [6,5,4,'agn','超相対論的ジェット（Γ>10）','相対論的ビーミング'],
  [6,6,4,'agn','ブレーザー・見かけ上の超光速','相対論的ビーミング効果'],
  [0,7,4,'bb','ビッグバン（プランク時代直後）','量子重力・インフレーション'],
  [5,7,4,'cos','CMB光子（宇宙マイクロ波背景放射）','宇宙論 + SR（光速移動）'],
  [4,7,4,'cos','放射優勢期・光子バリオン流体','宇宙論 + 相対論的流体力学'],
];

// Build lookup map
const CELLS = {};
CELLDATA.forEach(([t,s,v,regime,example,law]) => {
  CELLS[`${t},${s},${v}`] = { t, s, v, regime, example, law };
});

// ── THREE.JS ───────────────────────────────────────────────
const wrap = document.getElementById('canvas-wrap');
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x07070f);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x07070f, 0.018);

const camera = new THREE.PerspectiveCamera(48, 1, 0.1, 1000);
camera.position.set(14, 9, 18);
camera.lookAt(0, 0, 0);

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const dl1 = new THREE.DirectionalLight(0xffffff, 0.8);
dl1.position.set(6, 10, 10);
scene.add(dl1);
const dl2 = new THREE.DirectionalLight(0x88aaff, 0.35);
dl2.position.set(-6, -4, -8);
scene.add(dl2);

const group = new THREE.Group();
scene.add(group);

const NT=8, NS=8, NV=5;
const CUBE=0.62, GAP=1.28;

// Helper: hex to CSS
const hex2css = h => '#' + h.toString(16).padStart(6,'0');

// Create cubes
const meshes = [];
CELLDATA.forEach(([t,s,v,regime,ex,law]) => {
  const r = R[regime]; if (!r) return;
  const geo = new THREE.BoxGeometry(CUBE, CUBE, CUBE);
  const mat = new THREE.MeshPhongMaterial({
    color: r.c, transparent: true, opacity: 0.72, shininess: 80,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(
    (t - NT/2 + 0.5) * GAP,
    (s - NS/2 + 0.5) * GAP,
    (v - NV/2 + 0.5) * GAP
  );
  mesh.userData = { t, s, v, regime, example: ex, law, baseOp: 0.72 };
  group.add(mesh);
  meshes.push(mesh);

  // Wireframe edges
  const em = new THREE.LineSegments(
    new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({ color: r.c, transparent: true, opacity: 0.25 })
  );
  em.position.copy(mesh.position);
  em.userData = { isEdge: true };
  group.add(em);
});

// Axis reference lines
function axline(x1,y1,z1,x2,y2,z2,col){
  const g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x1,y1,z1),new THREE.Vector3(x2,y2,z2)]);
  group.add(new THREE.Line(g,new THREE.LineBasicMaterial({color:col,transparent:true,opacity:0.18})));
}
const hw={t:NT/2*GAP, s:NS/2*GAP, v:NV/2*GAP};
axline(-hw.t,-hw.s,-hw.v, hw.t,-hw.s,-hw.v, 0x00aaff); // X time
axline(-hw.t,-hw.s,-hw.v,-hw.t, hw.s,-hw.v, 0x00ff88); // Y size
axline(-hw.t,-hw.s,-hw.v,-hw.t,-hw.s, hw.v, 0xff44cc); // Z vel

// ── ORBIT CONTROLS ─────────────────────────────────────────
let rotX=0.28, rotY=0.55, drag=false, lx=0, ly=0;
group.rotation.set(rotX, rotY, 0);

canvas.addEventListener('mousedown', e=>{ drag=true; lx=e.clientX; ly=e.clientY; });
window.addEventListener('mouseup', ()=>{ drag=false; });
canvas.addEventListener('mousemove', e=>{
  if(!drag) return;
  rotY += (e.clientX-lx)*0.007; rotX += (e.clientY-ly)*0.007;
  rotX = Math.max(-1.4, Math.min(1.4, rotX));
  group.rotation.set(rotX, rotY, 0);
  lx=e.clientX; ly=e.clientY;
});
canvas.addEventListener('wheel', e=>{
  e.preventDefault();
  const f = 1 + e.deltaY*0.001;
  camera.position.multiplyScalar(Math.max(0.35, Math.min(3.5, f)));
  camera.lookAt(0,0,0);
},{passive:false});

// Touch
let ltx=0, lty=0;
canvas.addEventListener('touchstart', e=>{ ltx=e.touches[0].clientX; lty=e.touches[0].clientY; });
canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  rotY += (e.touches[0].clientX-ltx)*0.01; rotX += (e.touches[0].clientY-lty)*0.01;
  rotX = Math.max(-1.4, Math.min(1.4, rotX));
  group.rotation.set(rotX, rotY, 0); ltx=e.touches[0].clientX; lty=e.touches[0].clientY;
},{passive:false});

// ── HOVER / RAYCASTING ─────────────────────────────────────
const ray = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tip = document.getElementById('tip');
let hovered = null;

canvas.addEventListener('mousemove', e=>{
  if(drag){ tip.style.display='none'; return; }
  const rect=canvas.getBoundingClientRect();
  mouse.x = ((e.clientX-rect.left)/rect.width)*2-1;
  mouse.y = -((e.clientY-rect.top)/rect.height)*2+1;
  ray.setFromCamera(mouse, camera);
  const hits = ray.intersectObjects(meshes);

  if(hovered){ hovered.scale.setScalar(1); hovered.material.opacity=hovered.userData.baseOp; hovered=null; }

  if(hits.length){
    const m = hits[0].object;
    m.scale.setScalar(1.18); m.material.opacity=1.0; hovered=m;
    const d=m.userData;
    document.getElementById('tt-r').textContent = R[d.regime].n;
    document.getElementById('tt-r').style.color = hex2css(R[d.regime].c);
    document.getElementById('tt-a').textContent =
      `時間: ${T_LABELS[d.t]}　サイズ: ${S_LABELS[d.s]}　速度: ${V_LABELS[d.v]}`;
    document.getElementById('tt-e').textContent = d.example;
    document.getElementById('tt-l').textContent = d.law;
    tip.style.display='block';
    tip.style.left=(e.clientX+16)+'px'; tip.style.top=(e.clientY-12)+'px';
  } else {
    tip.style.display='none';
  }
});
canvas.addEventListener('mouseleave', ()=>{ tip.style.display='none'; });

// ── VELOCITY FILTER ────────────────────────────────────────
document.querySelectorAll('.vbtn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.vbtn').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    const vf = btn.dataset.v;
    group.children.forEach(obj=>{
      if(obj.userData.isEdge) return;
      if(obj.userData.t === undefined) return; // axis lines
      obj.visible = (vf==='all') || (obj.userData.v === parseInt(vf));
    });
    // also hide edges
    group.children.forEach(obj=>{
      if(obj.userData.isEdge){
        // edges don't have v, hide all then show
        obj.visible = false;
      }
    });
    // re-show edges that match visible meshes
    meshes.forEach(m=>{
      // find corresponding edge (same position)
      if(m.visible){
        group.children.forEach(e=>{
          if(e.userData.isEdge && e.position.equals(m.position)) e.visible=true;
        });
      }
    });
  });
});

// ── LEGEND ─────────────────────────────────────────────────
const legEl = document.getElementById('legend');
Object.entries(R).forEach(([k,r])=>{
  const d=document.createElement('div'); d.className='leg-item';
  d.innerHTML=`<div class="leg-dot" style="background:${hex2css(r.c)}"></div><span>${r.n}</span>`;
  legEl.appendChild(d);
});

// ── AXIS LABELS (HTML overlay) ──────────────────────────────
const labelsEl = document.getElementById('labels');
const labelDefs = [];

// Time labels (bottom front edge)
for(let t=0;t<NT;t++) labelDefs.push({ pos:[(t-NT/2+0.5)*GAP, -hw.s-1.0, -hw.v-0.8], text:T_LABELS[t], col:'rgba(0,180,255,0.7)' });
// Size labels (left front edge)
for(let s=0;s<NS;s++) labelDefs.push({ pos:[-hw.t-1.5, (s-NS/2+0.5)*GAP, -hw.v-0.5], text:S_LABELS[s], col:'rgba(0,255,140,0.7)' });
// Velocity labels (bottom left edge)
for(let v=0;v<NV;v++) labelDefs.push({ pos:[-hw.t-0.8, -hw.s-1.1, (v-NV/2+0.5)*GAP], text:V_LABELS[v], col:'rgba(255,80,200,0.7)' });

// Axis name labels
labelDefs.push({ pos:[0, -hw.s-1.9, -hw.v-1.2], text:'X: 時間スケール →', col:'rgba(0,180,255,0.95)', bold:true });
labelDefs.push({ pos:[-hw.t-2.8, 0, -hw.v-0.5], text:'Y: サイズ ↑', col:'rgba(0,255,140,0.95)', bold:true });
labelDefs.push({ pos:[-hw.t-0.5, -hw.s-1.9, 0], text:'Z: 速度 (v/c) ●', col:'rgba(255,80,200,0.95)', bold:true });

const labelEls = labelDefs.map(def=>{
  const el=document.createElement('div'); el.className='lbl';
  if(def.bold) el.classList.add('lbl-axis-name');
  el.textContent=def.text; el.style.color=def.col;
  labelsEl.appendChild(el);
  return { el, pos: new THREE.Vector3(...def.pos) };
});

// ── RESIZE ─────────────────────────────────────────────────
function resize(){
  const w=wrap.clientWidth, h=wrap.clientHeight;
  camera.aspect=w/h; camera.updateProjectionMatrix();
  renderer.setSize(w,h);
}
resize(); window.addEventListener('resize', resize);

// ── ANIMATION LOOP ─────────────────────────────────────────
const tmpVec = new THREE.Vector3();
function animate(){
  requestAnimationFrame(animate);
  group.updateMatrixWorld();
  renderer.render(scene, camera);

  // Update axis label HTML positions
  const W=wrap.clientWidth, H=wrap.clientHeight;
  labelEls.forEach(({el, pos})=>{
    tmpVec.copy(pos);
    tmpVec.applyMatrix4(group.matrixWorld);
    tmpVec.project(camera);
    if(tmpVec.z > 1){ el.style.display='none'; return; }
    el.style.display='block';
    el.style.left=((tmpVec.x*0.5+0.5)*W)+'px';
    el.style.top =((-tmpVec.y*0.5+0.5)*H)+'px';
  });
}
animate();
</script>
</body>
</html>
